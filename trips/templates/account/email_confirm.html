{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Email – Etheria</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="auth-form-page">
  <main class="auth-form-shell">
    <section class="auth-form-card">
      <a href="/" class="auth-logo">✈️ Etheria</a>

      <h1>Confirm your email</h1>

      <p class="auth-form-subtitle">
        Please confirm that this email address belongs to you so you can continue using Etheria.
      </p>

      <form method="post">
        {% csrf_token %}

        <button type="submit" class="btn btn-primary btn-full">
          Confirm Email
        </button>
      </form>

      <p class="auth-switch">
        Changed your mind?
        <a href="/">Back to Home</a>
      </p>
    </section>
  </main>
</body>
</html>
