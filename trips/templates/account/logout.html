{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Out – Etheria</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="auth-form-page">
  <main class="auth-form-shell">
    <section class="auth-form-card">
      <a href="/" class="auth-logo">✈️ Etheria</a>

      <h1>Sign out?</h1>
      <p class="auth-form-subtitle">
        Are you sure you want to sign out of Etheria?
      </p>

      <form method="post" action="{% url 'account_logout' %}" class="auth-form">
        {% csrf_token %}

        <button type="submit" class="btn btn-primary btn-full">
          Yes, sign out
        </button>
      </form>

      <p class="auth-switch">
        Changed your mind?
        <a href="{% url 'my_trips' %}">Cancel</a>
      </p>
    </section>
  </main>
</body>
</html>
