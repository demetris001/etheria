{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Trip – Etheria</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Back</a>
    
    <div class="trip-card">
      <h1 class="card-title">Join a Trip</h1>
      <p class="card-subtitle">Enter your invite code or link</p>
      
      <form method="get" action="#">
        <div class="field-group">
          <label for="code">Invite Code or Link</label>
          <input type="text" id="code" name="code" placeholder="Paste your invite link here" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Join Trip</button>
      </form>
    </div>
  </div>
</body>
</html>
